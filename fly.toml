app = "arizgateway"
primary_region = "iad"

[build]

[env]
  ARIZ_GATEWAY_PORT = "8080"
  ARIZ_DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "ariz_data"
  destination = "/data"
  initial_size = "1gb"
