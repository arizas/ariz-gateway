name = "near-rpc-proxy"
main = "near-rpc-proxy.js"
compatibility_date = "2024-01-01"

# Routes (customize for your domain)
# routes = [
#   { pattern = "api.yourdomain.com/near-rpc", zone_name = "yourdomain.com" }
# ]

# Development settings
[env.development]
[env.development.vars]
ENABLE_AUTH = "false"
CONTRACT_ID = "arizportfolio.near"
NEAR_RPC_URL = "https://rpc.mainnet.fastnear.com"

# Production settings
[env.production]
# All production settings are managed via secrets:
# wrangler secret put ENABLE_AUTH --env production  (set to "true" to enable)
# wrangler secret put CONTRACT_ID --env production
# wrangler secret put NEAR_RPC_URL --env production